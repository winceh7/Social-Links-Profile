<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Social links profile</title>
</head>
<body>
  <main>
    <div class="profile-card">
      <section class="profile-info">
        <img src="./assets/images/avatar-jessica.jpeg" alt="Profile picture" class="profile-pic">
        <div>
          <h1 id="name">Juan Pablo Suarez</h1>
          <h3 id="location">Guadalajara, Mexico</h3>
        </div>
        <p id="description">Aspiring front-end developer and game designer.</p>
      </section>
      <section class="social-links">
        <button type="button">Game Design Portfolio</button>
        <button type="button">GitHub</button>
        <button type="button">LinkedIn</button>
        <button type="button">Frontend Mentor</button>
      </section>
    </div>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">JP Suarez</a>.
  </footer>
</body>
</html>
