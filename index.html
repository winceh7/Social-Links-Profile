<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Social links profile</title>
</head>
<body>
  <main>
    <div class="profile-card">
      <section class="profile-info">
        <img src="./assets/images/avatar-jessica.jpeg" alt="Profile picture" class="profile-pic">
        <div>
          <h1>Juan Pablo Suarez</h1>
          <h3>Guadalajara, Mexico</h3>
        </div>
        <p class="description">Aspiring frontend developer</p>
      </section>
      <section class="social-links">
        <p>Game Design Portfolio</p>
        <p>GitHub</p>
        <p>LinkedIn</p>
        <p>Frontend Mentor</p>
      </section>
    </div>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
